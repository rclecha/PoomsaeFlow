name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    # Pinning to macos-15 to avoid error from a changed macos-latest
    runs-on: macos-26
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project PoomsaeFlow/PoomsaeFlow.xcodeproj \
            -scheme PoomsaeFlow \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest,arch=arm64" \
            -derivedDataPath build/DerivedData \
            -jobs 4 \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests (PoomsaeFlowTests)
        run: |
          xcodebuild test-without-building \
            -project PoomsaeFlow/PoomsaeFlow.xcodeproj \
            -scheme PoomsaeFlow \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest,arch=arm64" \
            -derivedDataPath build/DerivedData \
            -only-testing:PoomsaeFlowTests \
            -parallel-testing-enabled YES \
            -enableCodeCoverage YES \
            -resultBundlePath build/DerivedData/result.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Convert coverage to lcov
        run: |
          mkdir -p coverage
          XCRESULT="build/DerivedData/result.xcresult"
          echo "Found xcresult: $XCRESULT"
          xcrun xccov view --report --json "$XCRESULT" > coverage/coverage.json
          echo "Coverage JSON generated"
          cat coverage/coverage.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          targets = data.get('targets', [])
          for target in targets:
              files = target.get('files', [])
              for f in files:
                  path = f.get('path', '')
                  pct = f.get('lineCoverage', 0) * 100
                  print(f'{path}: {pct:.1f}%')
          "

      - name: Post coverage to job summary
        run: |
          python3 -c "
          import json, os

          with open('coverage/coverage.json') as f:
              data = json.load(f)

          rows = []
          total_exec = 0
          total_covered = 0

          for target in data.get('targets', []):
              for f in target.get('files', []):
                  name = f.get('name', '')
                  if (
                    'Test' in name or name.startswith('.')
                    or name.endswith('View.swift')
                    or name.endswith('App.swift')
                  ):
                      continue
                  exec_lines = f.get('executableLines', 0)
                  covered = f.get('coveredLines', 0)
                  pct = (covered / exec_lines * 100) if exec_lines > 0 else 0
                  total_exec += exec_lines
                  total_covered += covered
                  emoji = '✅' if pct >= 80 else ('⚠️' if pct >= 50 else '❌')
                  rows.append((name, pct, covered, exec_lines, emoji))

          rows.sort(key=lambda x: x[1])

          overall = (total_covered / total_exec * 100) if total_exec > 0 else 0
          overall_emoji = '✅' if overall >= 80 else ('⚠️' if overall >= 50 else '❌')

          lines = [
              '## 📊 Code Coverage Report',
              '',
              f'**Overall: {overall_emoji} {overall:.1f}%** ({total_covered}/{total_exec} lines)',
              '',
              '| File | Coverage | Lines |',
              '|------|----------|-------|',
          ]
          for name, pct, covered, exec_lines, emoji in rows:
              lines.append(f'| {name} | {emoji} {pct:.1f}% | {covered}/{exec_lines} |')

          summary = '\n'.join(lines)
          print(summary)

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write(summary)
          "
